version: '3.9'

services:

  # ─── Node.js API (scale with: docker-compose up --scale api=3) ──────────────
  api:
    build:
      context: .
      target: production
    ports:
      - '5000-5002:5000'   # maps host 5000/5001/5002 → container 5000
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/live_polling
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: 'true'
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - polling_net

  # ─── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: polling_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - polling_net

  # ─── Redis (Pub/Sub for WebSocket scaling) ───────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: polling_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes  # persistence enabled
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - polling_net

  # ─── Nginx load balancer (used when scaling api) ────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: polling_nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    profiles:
      - scaled
    networks:
      - polling_net

  # ─── Mongo Express UI — dev only ─────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: polling_mongo_express
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongo:
        condition: service_healthy
    profiles:
      - dev
    networks:
      - polling_net

volumes:
  mongo_data:
  redis_data:

networks:
  polling_net:
    driver: bridge
