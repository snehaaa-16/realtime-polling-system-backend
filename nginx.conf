events {
  worker_connections 1024;
}

http {
  upstream polling_api {
    # Round-robin load balancing across API instances
    # Docker Compose service discovery handles IPs automatically
    server api:5000;

    # Enable sticky sessions for Socket.IO
    # (Socket.IO needs a client to always hit the same instance
    #  OR you use Redis adapter — we use Redis so this is optional)
    ip_hash;
  }

  server {
    listen 80;

    # ─── REST API ─────────────────────────────────────────────────────────────
    location /api {
      proxy_pass         http://polling_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ─── Health check ─────────────────────────────────────────────────────────
    location /health {
      proxy_pass http://polling_api;
    }

    # ─── WebSocket (Socket.IO) ────────────────────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://polling_api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 86400s; # keep long-lived WebSocket connections alive
    }
  }
}
